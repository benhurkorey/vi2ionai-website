# Nginx vhost for vi2ionai.com.au
# Deploy to: /etc/nginx/sites-available/vi2ionai
# Enable:    ln -s /etc/nginx/sites-available/vi2ionai /etc/nginx/sites-enabled/vi2ionai
# Test:      nginx -t
# Reload:    systemctl reload nginx
#
# NOTE: Listens on 8082 only — Traefik owns 80/443
# NOTE: DO NOT touch /etc/nginx/sites-enabled/easylms or cognify configs

server {
    listen 8082;
    server_name vi2ionai.com.au www.vi2ionai.com.au vi2ionai.com www.vi2ionai.com _;

    root /var/www/vi2ionai;
    index index.php index.html;

    # Hide Nginx version from Server header and error pages
    server_tokens off;

    # ── Upload size limit ────────────────────────────────────────────────
    # Must be >= PHP post_max_size. Set to 15M to accommodate 10MB image
    # uploads plus multipart form overhead. Only applies to this vhost —
    # the LMS vhost (easylms) is untouched.
    client_max_body_size 15M;

    # Traefik passes X-Forwarded-Proto; PHP sees HTTPS correctly
    # Trust requests from Docker bridge networks (Traefik container lives on 172.17.x + 172.18.x)
    set_real_ip_from  172.17.0.0/16;
    set_real_ip_from  172.18.0.0/16;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    # ── Security headers ─────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"                          always;
    add_header X-Frame-Options         "SAMEORIGIN"                       always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"  always;
    # HSTS — 1 year, include subdomains (safe now that all domains use HTTPS)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Permissions: disable features not used by the site
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    # CSP — allows Google Fonts and same-origin scripts only
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none';" always;

    # ── Static assets with long cache ──
    location ~* \.(css|js|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Product image uploads ──
    location /uploads/ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ── Block direct access to PHP internals ──
    location ~ ^/includes/ {
        deny all;
        return 403;
    }

    # ── Block direct access to runtime storage (maintenance flag lives here) ──
    location ~ ^/storage/ {
        deny all;
        return 403;
    }

    # ── Maintenance mode ─────────────────────────────────────────────────
    # When .maintenance file exists, return 503 for public traffic only.
    # Admin (/admin/) and API (/api/) locations are separate blocks below
    # and are NOT affected — they always remain accessible.
    # The 503 body is served by maintenance.php (PHP session bypass for admins).
    error_page 503 /maintenance.php;

    # ── Admin area — NEVER goes through maintenance check ──
    location /admin/ {
        try_files $uri $uri/ /admin/index.php?$query_string;
    }

    # ── API endpoints — NEVER goes through maintenance check ──
    location /api/ {
        try_files $uri $uri/ /api/index.php?$query_string;
        add_header Cache-Control "no-store";
    }

    # ── Main router — maintenance flag checked here only ──
    location / {
        # Enable maintenance mode:  touch /var/www/vi2ionai/storage/.maintenance
        # Disable maintenance mode: rm    /var/www/vi2ionai/storage/.maintenance
        # Or use the Admin dashboard toggle — no SSH required.
        #
        # Bypass logic: logged-in admins carry the vi2_admin_bypass cookie whose
        # value matches the ADMIN_BYPASS_TOKEN secret injected at deploy time.
        # nginx cannot use AND in a single if(), so we build a combined variable:
        #   $maint_and_no_bypass = ""   → maintenance off, or bypass cookie present → serve normally
        #   $maint_and_no_bypass = "10" → maintenance ON + no valid bypass cookie → 503
        #   $maint_and_no_bypass = "11" → maintenance ON + bypass cookie valid     → serve normally
        set $skip_maint 0;
        if ($cookie_vi2_admin_bypass = "BYPASS_TOKEN_PLACEHOLDER") {
            set $skip_maint 1;
        }
        set $maint_and_no_bypass "";
        if (-f $document_root/storage/.maintenance) {
            set $maint_and_no_bypass "1$skip_maint";
        }
        if ($maint_and_no_bypass = "10") {
            return 503;
        }
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM ──
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass  unix:/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS           on;           # Traefik terminates SSL
        fastcgi_param HTTP_HOST       $host;
        fastcgi_read_timeout 60;
    }

    # ── Deny hidden files ──
    location ~ /\. {
        deny all;
    }

    # ── Logs ──
    access_log /var/log/nginx/vi2ionai.access.log;
    error_log  /var/log/nginx/vi2ionai.error.log warn;
}
