; Vi2ionai Fleet — PHP-FPM upload overrides
; Deployed to: /etc/php/8.3/fpm/conf.d/99-vi2ionai.ini
; Applied to the vi2ionai site only (last file in conf.d wins).
; Do NOT raise these limits on the LMS or system-wide php.ini.
;
; Rule: post_max_size > upload_max_filesize (add ~25% for multipart overhead)
; Target: 10 MB max image upload with safe headroom at every layer.

upload_max_filesize = 12M
post_max_size       = 15M
max_file_uploads    = 5
