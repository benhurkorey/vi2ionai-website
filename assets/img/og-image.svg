<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Left accent bar -->
  <rect x="72" y="180" width="4" height="280" fill="url(#accent)" rx="2"/>

  <!-- GPS pin icon (decorative) -->
  <circle cx="900" cy="315" r="180" fill="rgba(59,130,246,0.04)"/>
  <circle cx="900" cy="315" r="120" fill="rgba(59,130,246,0.05)"/>
  <circle cx="900" cy="315" r="60" fill="rgba(59,130,246,0.06)"/>

  <!-- Map pin -->
  <path d="M900 220 C870 220 846 244 846 274 C846 320 900 370 900 370 C900 370 954 320 954 274 C954 244 930 220 900 220 Z" fill="rgba(255,255,255,0.08)"/>
  <circle cx="900" cy="272" r="18" fill="rgba(255,255,255,0.15)"/>

  <!-- Signal rings -->
  <circle cx="900" cy="272" r="36" fill="none" stroke="rgba(59,130,246,0.2)" stroke-width="1.5"/>
  <circle cx="900" cy="272" r="56" fill="none" stroke="rgba(59,130,246,0.12)" stroke-width="1"/>
  <circle cx="900" cy="272" r="76" fill="none" stroke="rgba(59,130,246,0.07)" stroke-width="1"/>

  <!-- Brand wordmark -->
  <text x="96" y="268" font-family="Arial,sans-serif" font-size="52" font-weight="900" fill="#ffffff" letter-spacing="-2">VI2IONAI</text>
  <text x="99" y="310" font-family="Arial,sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.4)" letter-spacing="1">FLEET GPS TRACKING</text>

  <!-- Main headline -->
  <text x="96" y="390" font-family="Arial,sans-serif" font-size="42" font-weight="800" fill="#ffffff" letter-spacing="-1">Australia's Fleet GPS Platform</text>
  <text x="96" y="435" font-family="Arial,sans-serif" font-size="28" font-weight="400" fill="rgba(255,255,255,0.55)">Real-time tracking · AI Dash Cams · NHVR EWD · From $25/veh/mo</text>

  <!-- Trust badges -->
  <rect x="96" y="480" width="160" height="36" rx="18" fill="rgba(255,255,255,0.07)"/>
  <text x="176" y="503" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="rgba(255,255,255,0.6)" text-anchor="middle">Australian Owned</text>

  <rect x="270" y="480" width="160" height="36" rx="18" fill="rgba(255,255,255,0.07)"/>
  <text x="350" y="503" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="rgba(255,255,255,0.6)" text-anchor="middle">No Lock-In Contracts</text>

  <rect x="444" y="480" width="160" height="36" rx="18" fill="rgba(255,255,255,0.07)"/>
  <text x="524" y="503" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="rgba(255,255,255,0.6)" text-anchor="middle">NHVR Approved EWD</text>

  <!-- Bottom URL -->
  <text x="96" y="575" font-family="Arial,sans-serif" font-size="16" fill="rgba(255,255,255,0.25)">vi2ionai.com.au</text>
</svg>
